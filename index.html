<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>空 · Kong — 宇宙冥想</title>
<meta name="description" content="An ever-evolving digital meditation — a serene cosmic space that renews itself every hour.">
<meta name="theme-color" content="#0a0a0f">
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@200;400;700;900&family=Inter:wght@200;400;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0f;
    color: #e8e6e3;
    font-family: 'Noto Serif SC', 'Inter', sans-serif;
    overflow: hidden;
    height: 100vh; width: 100vw;
    user-select: none;
    cursor: none;
  }

  #canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100vw; height: 100vh;
    z-index: 0;
  }

  /* ── Custom cursor ── */
  #cursor {
    position: fixed;
    z-index: 99;
    pointer-events: none;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: rgba(200,210,255,0.5);
    box-shadow: 0 0 20px 6px rgba(150,170,255,0.15);
    transform: translate(-50%, -50%);
    transition: width 0.2s, height 0.2s, background 0.2s;
    mix-blend-mode: screen;
  }
  #cursor.trail {
    width: 40px; height: 40px;
    background: rgba(200,210,255,0.08);
    box-shadow: 0 0 40px 15px rgba(150,170,255,0.05);
  }

  /* ── Main char ── */
  .overlay {
    position: fixed;
    z-index: 1;
    width: 100vw; height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    pointer-events: none;
  }
  .main-char {
    font-size: clamp(120px, 20vw, 280px);
    font-weight: 200;
    color: rgba(255,255,255,0.06);
    letter-spacing: 0.1em;
    animation: breathe 8s ease-in-out infinite;
  }
  @keyframes breathe {
    0%, 100% { opacity: 0.06; transform: scale(1); }
    50% { opacity: 0.12; transform: scale(1.04); }
  }
  .subtitle {
    font-size: clamp(14px, 2vw, 28px);
    font-weight: 200;
    color: rgba(255,255,255,0.2);
    letter-spacing: 0.6em;
    margin-top: -1em;
  }

  /* ── Quote card ── */
  .card {
    position: fixed;
    z-index: 2;
    bottom: 12vh;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    pointer-events: none;
  }
  .card .quote {
    font-size: clamp(16px, 2.2vw, 36px);
    font-weight: 200;
    line-height: 1.8;
    color: rgba(255,255,255,0.7);
    max-width: 80vw;
    margin: 0 auto;
    letter-spacing: 0.08em;
    transition: opacity 0.6s ease, transform 0.6s ease;
  }
  .card .quote.fade {
    opacity: 0;
    transform: translateY(12px);
  }
  .card .source {
    font-family: 'Inter', sans-serif;
    font-size: clamp(11px, 1vw, 16px);
    font-weight: 200;
    color: rgba(255,255,255,0.25);
    margin-top: 1.2em;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    transition: opacity 0.6s ease;
  }
  .card .source.fade { opacity: 0; }
  .card .meta {
    font-family: 'Inter', sans-serif;
    font-size: clamp(10px, 0.8vw, 13px);
    font-weight: 200;
    color: rgba(255,255,255,0.12);
    margin-top: 2em;
    letter-spacing: 0.15em;
  }

  /* ── Corner UI ── */
  .corner {
    position: fixed;
    z-index: 3;
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    font-weight: 200;
    color: rgba(255,255,255,0.12);
    letter-spacing: 0.15em;
    pointer-events: auto;
    cursor: pointer;
    transition: color 0.3s;
  }
  .corner:hover { color: rgba(255,255,255,0.4); }
  .corner-tl { top: 2.4rem; left: 2.4rem; }
  .corner-br { bottom: 2.4rem; right: 2.4rem; cursor: default; pointer-events: none; }

  .live-dot {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #4ade80;
    margin-right: 6px;
    animation: pulse-dot 2s ease-in-out infinite;
    vertical-align: middle;
  }
  @keyframes pulse-dot {
    0%, 100% { opacity: 0.3; box-shadow: 0 0 0 0 rgba(74,222,128,0.2); }
    50% { opacity: 1; box-shadow: 0 0 8px 2px rgba(74,222,128,0.3); }
  }

  /* ── HUD ── */
  .hud {
    position: fixed;
    z-index: 3;
    bottom: 2.4rem;
    left: 2.4rem;
    display: flex;
    gap: 1.2rem;
    align-items: center;
  }
  .hud-btn {
    font-family: 'Inter', sans-serif;
    font-size: 10px;
    font-weight: 200;
    color: rgba(255,255,255,0.18);
    letter-spacing: 0.15em;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.06);
    padding: 6px 14px;
    border-radius: 20px;
    cursor: pointer;
    pointer-events: auto;
    transition: all 0.3s;
    backdrop-filter: blur(4px);
  }
  .hud-btn:hover {
    color: rgba(255,255,255,0.5);
    background: rgba(255,255,255,0.06);
    border-color: rgba(255,255,255,0.12);
  }
  .hud-btn.active {
    color: rgba(74,222,128,0.5);
    border-color: rgba(74,222,128,0.15);
  }

  /* ── Sound indicator ── */
  .sound-ind {
    font-size: 14px;
    font-family: 'Inter', sans-serif;
    color: rgba(255,255,255,0.1);
  }

  /* ── Meditation overlay ── */
  #meditation-overlay {
    position: fixed;
    z-index: 10;
    top: 0; left: 0;
    width: 100vw; height: 100vh;
    background: #000;
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    cursor: none;
  }
  #meditation-overlay.show {
    display: flex;
  }
  #meditation-overlay .timer {
    font-family: 'Inter', sans-serif;
    font-size: clamp(60px, 12vw, 120px);
    font-weight: 200;
    color: rgba(255,255,255,0.08);
    letter-spacing: 0.1em;
  }
  #meditation-overlay .hint {
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    font-weight: 200;
    color: rgba(255,255,255,0.1);
    margin-top: 2rem;
    letter-spacing: 0.2em;
  }

  @media (max-width: 600px) {
    .corner-tl { display: none; }
    .hud { left: 1.2rem; bottom: 1.2rem; gap: 0.6rem; }
    .hud-btn { padding: 4px 10px; font-size: 9px; }
  }
</style>
</head>
<body>

<canvas id="canvas"></canvas>
<div id="cursor"></div>

<div class="overlay">
  <div class="main-char">空</div>
  <div class="subtitle">K O N G</div>
</div>

<div class="corner corner-tl" id="soundToggle" title="Toggle ambient sound">
  <span id="soundIcon">♫</span>
</div>
<div class="corner corner-br" id="clock">--:--:--</div>

<div class="hud">
  <button class="hud-btn" id="focusBtn">⟐ FOCUS</button>
  <button class="hud-btn" id="constBtn">✦ CONST</button>
</div>

<div class="card" id="card">
  <div class="quote" id="quote">&#x2026;</div>
  <div class="source" id="source">&nbsp;</div>
  <div class="meta" id="meta">&nbsp;</div>
</div>

<div id="meditation-overlay">
  <div class="timer" id="medTimer">00:00</div>
  <div class="hint">tap to return</div>
</div>

<script>
  // ═══════════════════════════════════════════
  //  CANVAS — Enhanced Particle System
  // ═══════════════════════════════════════════

  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  let W, H, stars = [], shootingStars = [];
  let mouse = { x: -9999, y: -9999, vx: 0, vy: 0, prevX: -9999, prevY: -9999 };
  let constMode = false;
  let ripples = [];

  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  const STAR_COUNT = 500;
  for (let i = 0; i < STAR_COUNT; i++) {
    stars.push({
      x: Math.random() * W,
      y: Math.random() * H,
      baseX: 0, baseY: 0,
      r: Math.random() * 2.0 + 0.3,
      a: Math.random(),
      da: (Math.random() - 0.5) * 0.006,
      speed: Math.random() * 0.12 + 0.02,
      phase: Math.random() * Math.PI * 2,
      twinkleSpeed: 0.5 + Math.random() * 2,
    });
  }
  stars.forEach(s => { s.baseX = s.x; s.baseY = s.y; });

  // Mouse tracking
  document.addEventListener('mousemove', e => {
    mouse.prevX = mouse.x;
    mouse.prevY = mouse.y;
    mouse.x = e.clientX;
    mouse.y = e.clientY;
    mouse.vx = mouse.x - mouse.prevX;
    mouse.vy = mouse.y - mouse.prevY;
  });
  document.addEventListener('touchmove', e => {
    const t = e.touches[0];
    mouse.prevX = mouse.x; mouse.prevY = mouse.y;
    mouse.x = t.clientX; mouse.y = t.clientY;
    mouse.vx = mouse.x - mouse.prevX;
    mouse.vy = mouse.y - mouse.prevY;
  }, { passive: true });
  document.addEventListener('touchstart', e => {
    const t = e.touches[0];
    mouse.x = t.clientX; mouse.y = t.clientY;
    mouse.prevX = mouse.x; mouse.prevY = mouse.y;
  }, { passive: true });

  // Click ripple
  document.addEventListener('click', e => {
    ripples.push({ x: e.clientX, y: e.clientY, r: 0, maxR: 60 + Math.random() * 40, life: 1 });
  });
  document.addEventListener('touchstart', e => {
    const t = e.touches[0];
    ripples.push({ x: t.clientX, y: t.clientY, r: 0, maxR: 60 + Math.random() * 40, life: 1 });
  }, { passive: true });

  document.addEventListener('mouseleave', () => { mouse.x = -9999; mouse.y = -9999; });

  function spawnShootingStar() {
    const angle = Math.PI / 4 + (Math.random() - 0.5) * 0.8;
    const speed = 4 + Math.random() * 8;
    shootingStars.push({
      x: Math.random() * W,
      y: Math.random() * H * 0.3,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1,
      len: 50 + Math.random() * 80,
      r: 0.8 + Math.random() * 0.8,
    });
  }
  setInterval(() => { if (Math.random() < 0.25) spawnShootingStar(); }, 2500);

  function drawStars(time) {
    ctx.clearRect(0, 0, W, H);

    // Nebula
    const nebX = W * 0.25 + Math.sin(time * 0.00008) * W * 0.25;
    const nebY = H * 0.35 + Math.cos(time * 0.00012) * H * 0.2;
    const g = ctx.createRadialGradient(nebX, nebY, 0, nebX, nebY, W * 0.35);
    g.addColorStop(0, 'rgba(80,50,140,0.04)');
    g.addColorStop(0.4, 'rgba(40,20,80,0.025)');
    g.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H);

    // Second nebula
    const nebX2 = W * 0.75 + Math.cos(time * 0.0001) * W * 0.2;
    const nebY2 = H * 0.65 + Math.sin(time * 0.00009) * H * 0.15;
    const g2 = ctx.createRadialGradient(nebX2, nebY2, 0, nebX2, nebY2, W * 0.25);
    g2.addColorStop(0, 'rgba(20,60,120,0.03)');
    g2.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = g2;
    ctx.fillRect(0, 0, W, H);

    // Mouse influence zone
    const mInf = (mouse.x > 0 && mouse.y > 0) ? 200 : 0;

    // Draw constellation lines first
    if (constMode) {
      for (let i = 0; i < stars.length; i += 3) {
        for (let j = i + 3; j < stars.length; j += 3) {
          const dx = stars[i].x - stars[j].x;
          const dy = stars[i].y - stars[j].y;
          const dist = Math.hypot(dx, dy);
          if (dist < 100 && dist > 5) {
            const alpha = (1 - dist / 100) * 0.12;
            ctx.beginPath();
            ctx.moveTo(stars[i].x, stars[i].y);
            ctx.lineTo(stars[j].x, stars[j].y);
            ctx.strokeStyle = `rgba(180,200,255,${alpha})`;
            ctx.lineWidth = 0.4;
            ctx.stroke();
          }
        }
      }
    }

    // Draw stars
    for (const s of stars) {
      // Twinkle
      const twinkle = Math.sin(time * 0.001 * s.twinkleSpeed + s.phase) * 0.3 + 0.7;
      s.a += s.da;
      if (s.a > 1) s.a = 1;
      if (s.a < 0.2) s.a = 0.2;

      // Mouse attraction
      let dx = 0, dy = 0;
      if (mInf > 0) {
        const dist = Math.hypot(s.x - mouse.x, s.y - mouse.y);
        if (dist < mInf && dist > 0) {
          const force = (1 - dist / mInf) * 0.3;
          dx = (mouse.x - s.x) / dist * force * 1.5;
          dy = (mouse.y - s.y) / dist * force * 1.5;
        }
      }

      // Drift
      s.y -= s.speed + dy * 0.3;
      s.x += dx * 0.3;
      if (s.y < -5) { s.y = H + 5; s.x = Math.random() * W; s.baseX = s.x; s.baseY = s.y; }
      if (s.x < -5) s.x = W + 5;
      if (s.x > W + 5) s.x = -5;

      const alpha = s.a * twinkle * 0.85;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,255,255,${alpha})`;
      ctx.fill();

      // Glow
      if (s.r > 1.3) {
        const glow = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, s.r * 4);
        glow.addColorStop(0, `rgba(200,210,255,${alpha * 0.08})`);
        glow.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = glow;
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r * 4, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    // Ripples
    for (let i = ripples.length - 1; i >= 0; i--) {
      const rip = ripples[i];
      rip.r += 1.5;
      rip.life -= 0.02;
      if (rip.life <= 0) { ripples.splice(i, 1); continue; }
      ctx.beginPath();
      ctx.arc(rip.x, rip.y, rip.r, 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(200,210,255,${rip.life * 0.15})`;
      ctx.lineWidth = 1;
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(rip.x, rip.y, rip.r * 0.5, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(200,210,255,${rip.life * 0.03})`;
      ctx.fill();
    }

    // Shooting stars
    for (let i = shootingStars.length - 1; i >= 0; i--) {
      const ss = shootingStars[i];
      ss.x += ss.vx; ss.y += ss.vy;
      ss.life -= 0.01;
      if (ss.life <= 0) { shootingStars.splice(i, 1); continue; }

      const len = ss.len * ss.life;
      const angle = Math.atan2(ss.vy, ss.vx);
      ctx.beginPath();
      ctx.moveTo(ss.x, ss.y);
      ctx.lineTo(ss.x - Math.cos(angle) * len, ss.y - Math.sin(angle) * len);
      ctx.strokeStyle = `rgba(255,255,255,${ss.life * 0.5})`;
      ctx.lineWidth = ss.r;
      ctx.stroke();

      // Head glow
      const hg = ctx.createRadialGradient(ss.x, ss.y, 0, ss.x, ss.y, ss.r * 6);
      hg.addColorStop(0, `rgba(180,210,255,${ss.life * 0.15})`);
      hg.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = hg;
      ctx.beginPath();
      ctx.arc(ss.x, ss.y, ss.r * 6, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // ═══════════════════════════════════════════
  //  CURSOR
  // ═══════════════════════════════════════════

  const cursorEl = document.getElementById('cursor');
  let cursorX = -100, cursorY = -100;

  function updateCursor() {
    cursorX += (mouse.x - cursorX) * 0.15;
    cursorY += (mouse.y - cursorY) * 0.15;
    cursorEl.style.left = cursorX + 'px';
    cursorEl.style.top = cursorY + 'px';
    const speed = Math.hypot(mouse.vx, mouse.vy);
    cursorEl.classList.toggle('trail', speed > 2);
    requestAnimationFrame(updateCursor);
  }
  updateCursor();

  // ═══════════════════════════════════════════
  //  WEB AUDIO — Generative Ambient
  // ═══════════════════════════════════════════

  let audioCtx, ambGain, oscs = [], playing = false;

  function initAudio() {
    if (audioCtx) return;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    // Master gain
    ambGain = audioCtx.createGain();
    ambGain.gain.value = 0.04;
    ambGain.connect(audioCtx.destination);

    // Create 3 drifting sine oscillators
    const baseFreq = 55; // A1
    for (let i = 0; i < 3; i++) {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      const lfo = audioCtx.createOscillator();
      const lfoGain = audioCtx.createGain();

      osc.type = 'sine';
      osc.frequency.value = baseFreq * (1 + i * 0.5 + Math.random() * 0.1);

      lfo.frequency.value = 0.03 + Math.random() * 0.05;
      lfoGain.gain.value = 2 + Math.random() * 3;

      lfo.connect(lfoGain);
      lfoGain.connect(osc.frequency);
      osc.connect(gain);

      gain.gain.value = 0.3 + Math.random() * 0.2;
      gain.connect(ambGain);

      lfo.start();
      osc.start();

      oscs.push({ osc, gain, lfo, lfoGain });
    }

    // Add a soft noise layer
    const bufferSize = audioCtx.sampleRate * 2;
    const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) {
      data[i] = (Math.random() * 2 - 1) * Math.pow(Math.random(), 4);
    }
    const noise = audioCtx.createBufferSource();
    noise.buffer = buffer;
    noise.loop = true;
    const noiseGain = audioCtx.createGain();
    noiseGain.gain.value = 0.008;
    const noiseFilter = audioCtx.createBiquadFilter();
    noiseFilter.type = 'lowpass';
    noiseFilter.frequency.value = 200;
    noise.connect(noiseFilter);
    noiseFilter.connect(noiseGain);
    noiseGain.connect(ambGain);
    noise.start();
    oscs.push({ osc: noise, gain: noiseGain, lfo: null, lfoGain: null });

    playing = true;
    document.getElementById('soundIcon').textContent = '♬';
  }

  function toggleAudio() {
    if (!playing) {
      initAudio();
      document.getElementById('soundIcon').textContent = '♬';
    } else {
      if (audioCtx) {
        audioCtx.close().then(() => {
          audioCtx = null;
          oscs = [];
          playing = false;
          document.getElementById('soundIcon').textContent = '♫';
        });
      }
    }
  }

  document.getElementById('soundToggle').addEventListener('click', toggleAudio);

  // ═══════════════════════════════════════════
  //  CONSTELLATION MODE
  // ═══════════════════════════════════════════

  document.getElementById('constBtn').addEventListener('click', () => {
    constMode = !constMode;
    document.getElementById('constBtn').classList.toggle('active');
  });

  // ═══════════════════════════════════════════
  //  FOCUS / MEDITATION MODE
  // ═══════════════════════════════════════════

  const medOverlay = document.getElementById('meditation-overlay');
  const medTimer = document.getElementById('medTimer');
  let medStart = 0, medInterval = null;

  document.getElementById('focusBtn').addEventListener('click', () => {
    medOverlay.classList.add('show');
    medStart = Date.now();
    if (medInterval) clearInterval(medInterval);
    medInterval = setInterval(() => {
      const elapsed = Math.floor((Date.now() - medStart) / 1000);
      const m = String(Math.floor(elapsed / 60)).padStart(2, '0');
      const s = String(elapsed % 60).padStart(2, '0');
      medTimer.textContent = m + ':' + s;
    }, 200);
  });

  medOverlay.addEventListener('click', () => {
    medOverlay.classList.remove('show');
    if (medInterval) { clearInterval(medInterval); medInterval = null; }
  });

  // ═══════════════════════════════════════════
  //  CLOCK
  // ═══════════════════════════════════════════

  function updateClock() {
    const now = new Date();
    document.getElementById('clock').textContent =
      now.toLocaleString('zh-CN', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
  }
  setInterval(updateClock, 1000);
  updateClock();

  // ═══════════════════════════════════════════
  //  DATA LOADER
  // ═══════════════════════════════════════════

  let currentQuote = '';
  let currentSource = '';

  function updateQuoteUI(data) {
    const qEl = document.getElementById('quote');
    const sEl = document.getElementById('source');
    const mEl = document.getElementById('meta');

    // Fade out
    qEl.classList.add('fade');
    sEl.classList.add('fade');

    setTimeout(() => {
      currentQuote = data.quote || '\u2026';
      currentSource = data.source || '';
      qEl.textContent = currentQuote;
      sEl.textContent = currentSource;

      const updated = data.updated
        ? new Date(data.updated).toLocaleString('zh-CN', { hour12: false, year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' })
        : '';
      mEl.textContent = (data.index ? '#' + data.index : '') + (updated ? '  \u00B7 updated ' + updated : '');

      // Fade in
      qEl.classList.remove('fade');
      sEl.classList.remove('fade');
    }, 400);
  }

  async function loadData() {
    try {
      const resp = await fetch('data.json?_=' + Date.now());
      const data = await resp.json();
      updateQuoteUI(data);
    } catch (e) {
      document.getElementById('quote').textContent = '\u865A\u7A7A\u751F\u4E07\u6709';
      document.getElementById('source').textContent = '\u2014';
    }
  }

  loadData();
  setInterval(loadData, 60000);

  // ═══════════════════════════════════════════
  //  RENDER LOOP
  // ═══════════════════════════════════════════

  function loop(time) {
    drawStars(time);
    requestAnimationFrame(loop);
  }

  // ── Service Worker Registration ──
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("sw.js").catch(() => {});
    });
  }
  requestAnimationFrame(loop);

  // ═══════════════════════════════════════════
  //  KEYBOARD SHORTCUTS
  // ═══════════════════════════════════════════

  document.addEventListener('keydown', e => {
    if (e.key === 'f' || e.key === 'F') document.getElementById('focusBtn').click();
    if (e.key === 'c' || e.key === 'C') document.getElementById('constBtn').click();
    if (e.key === 's' || e.key === 'S') toggleAudio();
    if (e.key === 'Escape') { medOverlay.classList.remove('show'); if (medInterval) { clearInterval(medInterval); medInterval = null; } }
  });

  console.log('\u2728 \u7A7A \u00B7 KONG');
  console.log('\u5929\u5730\u4E4B\u95F4\uFF0C\u5176\u72B9\u6A3E\u7B20\u4E4E\uFF1F');
  console.log('\u2014 \u300A\u8001\u5B50\u300B');
</script></body>
</html>
