<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>空 · Kong</title>
<meta name="theme-color" content="#0a0a0f">
<link rel="manifest" href="manifest.json">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;color:#e8e6e3;font-family:serif;overflow:hidden;height:100vh;width:100vw;user-select:none;cursor:none}
#c{position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:0}
#cur{position:fixed;z-index:99;pointer-events:none;width:8px;height:8px;border-radius:50%;background:rgba(200,210,255,0.5);box-shadow:0 0 20px 6px rgba(150,170,255,0.15);transform:translate(-50%,-50%);transition:width .2s,height .2s;mix-blend-mode:screen}
.o{position:fixed;z-index:1;width:100vw;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none}
.m{font-size:clamp(120px,20vw,280px);font-weight:200;color:rgba(255,255,255,0.06);letter-spacing:.1em;animation:b 8s ease-in-out infinite}
@keyframes b{0%,100%{opacity:.06;transform:scale(1)}50%{opacity:.12;transform:scale(1.04)}}
.s{font-size:clamp(14px,2vw,28px);font-weight:200;color:rgba(255,255,255,0.2);letter-spacing:.6em;margin-top:-1em}
.card{position:fixed;z-index:2;bottom:12vh;left:50%;transform:translateX(-50%);text-align:center;pointer-events:none}
.q{font-size:clamp(16px,2.2vw,36px);font-weight:200;line-height:1.8;color:rgba(255,255,255,0.7);max-width:80vw;letter-spacing:.08em;transition:opacity .6s}
.src{font-family:monospace;font-size:clamp(11px,1vw,16px);font-weight:200;color:rgba(255,255,255,0.25);margin-top:1.2em;letter-spacing:.3em}
.meta{font-family:monospace;font-size:clamp(10px,.8vw,13px);font-weight:200;color:rgba(255,255,255,0.12);margin-top:2em;letter-spacing:.15em}
.cnr{position:fixed;z-index:3;font-family:monospace;font-size:11px;font-weight:200;color:rgba(255,255,255,0.12);letter-spacing:.15em;pointer-events:auto;cursor:pointer}
.tl{top:2.4rem;left:2.4rem}.br{bottom:2.4rem;right:2.4rem;cursor:default;pointer-events:none}
.ld{display:inline-block;width:6px;height:6px;border-radius:50%;background:#4ade80;margin-right:6px;animation:pd 2s ease-in-out infinite;vertical-align:middle}
@keyframes pd{0%,100%{opacity:.3}50%{opacity:1}}
.hud{position:fixed;z-index:3;bottom:2.4rem;left:2.4rem;display:flex;gap:1.2rem}
.hud button{font-family:monospace;font-size:10px;font-weight:200;color:rgba(255,255,255,0.18);letter-spacing:.15em;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);padding:6px 14px;border-radius:20px;cursor:pointer;pointer-events:auto;transition:all .3s}
.hud button:hover{color:rgba(255,255,255,0.5);background:rgba(255,255,255,0.06)}
@media(max-width:600px){.tl{display:none}.hud{left:1.2rem;bottom:1.2rem;gap:.6rem}.hud button{padding:4px 10px;font-size:9px}}
</style></head><body>
<canvas id="c"></canvas>
<div id="cur"></div>
<div class="o"><div class="m">空</div><div class="s">K O N G</div></div>
<div class="cnr tl" id="st">♫</div>
<div class="cnr tl" id="shc" style="left:5.5rem">⬇</div>
<div class="cnr br" id="clock">--:--:--</div>
<div class="hud"><button id="fBtn">⟀ FOCUS</button><button id="cBtn">✦ CONST</button><button id="shareBtn">SHARE</button></div>
<div class="card"><div class="q" id="q">…</div><div class="src" id="src">&nbsp;</div><div class="meta" id="meta">&nbsp;</div></div>
<script>
var c=document.getElementById("c"),cx=c.getContext("2d"),W,H,st=[],ss=[],mx={x:-999,y:-999},cmode=false;
function rs(){W=c.width=innerWidth;H=c.height=innerHeight}onresize=rs;rs();
for(var i=0;i<500;i++)st.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*2+0.3,a:Math.random(),da:(Math.random()-0.5)*0.006,sp:Math.random()*0.12+0.02});
onmousemove=function(e){mx.x=e.clientX;mx.y=e.clientY};onmouseleave=function(){mx.x=-999;mx.y=-999};
setInterval(function(){if(Math.random()<0.25){var a=Math.PI/4+(Math.random()-0.5)*0.8,s=4+Math.random()*8;ss.push({x:Math.random()*W,y:Math.random()*H*0.3,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,len:50+Math.random()*80,r:0.8+Math.random()*0.8})}},2500);
function draw(t){cx.clearRect(0,0,W,H);
var g=cx.createRadialGradient(W/2,H/2,0,W/2,H/2,Math.max(W,H)*0.7);g.addColorStop(0,"#0f0f1a");g.addColorStop(0.5,"#0a0a12");g.addColorStop(1,"#050508");cx.fillStyle=g;cx.fillRect(0,0,W,H);
var md=mx.x>0?200:0;
for(var i=0;i<st.length;i++){var s=st[i];s.a+=s.da;if(s.a>1)s.a=1;if(s.a<0.2)s.a=0.2;s.y-=s.sp;if(s.y<-5){s.y=H+5;s.x=Math.random()*W}if(md){var d=Math.hypot(s.x-mx.x,s.y-mx.y);if(d<md&&d>0){var f=(1-d/md)*0.3;s.x+=(mx.x-s.x)/d*f;s.y+=(mx.y-s.y)/d*f}}
cx.beginPath();cx.arc(s.x,s.y,s.r,0,Math.PI*2);cx.fillStyle="rgba(255,255,255,"+(s.a*0.85)+")";cx.fill()}
if(cmode){for(var i=0;i<st.length;i+=3){for(var j=i+3;j<st.length;j+=3){var dx=st[i].x-st[j].x,dy=st[i].y-st[j].y,dist=Math.hypot(dx,dy);if(dist<100&&dist>5){cx.beginPath();cx.moveTo(st[i].x,st[i].y);cx.lineTo(st[j].x,st[j].y);cx.strokeStyle="rgba(180,200,255,"+(0.12*(1-dist/100))+")";cx.lineWidth=0.4;cx.stroke()}}}}
for(var i=ss.length-1;i>=0;i--){var s=ss[i];s.x+=s.vx;s.y+=s.vy;s.life-=0.01;if(s.life<=0){ss.splice(i,1);continue}
var a=Math.atan2(s.vy,s.vx);cx.beginPath();cx.moveTo(s.x,s.y);cx.lineTo(s.x-Math.cos(a)*s.len*s.life,s.y-Math.sin(a)*s.len*s.life);cx.strokeStyle="rgba(255,255,255,"+(s.life*0.5)+")";cx.lineWidth=s.r;cx.stroke()}
requestAnimationFrame(draw)}requestAnimationFrame(draw);
function uc(){var n=new Date();document.getElementById("clock").textContent=n.toLocaleString("zh-CN",{hour12:false,hour:"2-digit",minute:"2-digit",second:"2-digit"})}setInterval(uc,1000);uc();
async function ld(){try{var r=await fetch("data.json?_="+Date.now()),d=await r.json();document.getElementById("q").textContent=d.quote||"…";document.getElementById("src").textContent=d.source||"";var u=d.updated?new Date(d.updated).toLocaleString("zh-CN",{hour12:false,year:"numeric",month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit"}):"";document.getElementById("meta").textContent=(d.index?"#"+d.index:"")+(u?"  updated "+u:"")}catch(e){document.getElementById("q").textContent="虚空生万有"}}ld();setInterval(ld,60000);
var actx,ambGain,playing=false;
function initAudio(){if(actx)return;actx=new(window.AudioContext||window.webkitAudioContext)();ambGain=actx.createGain();ambGain.gain.value=0.04;ambGain.connect(actx.destination);
for(var i=0;i<3;i++){var o=actx.createOscillator(),g=actx.createGain(),l=actx.createOscillator(),lg=actx.createGain();o.type="sine";o.frequency.value=55*(1+i*0.5+Math.random()*0.1);l.frequency.value=0.03+Math.random()*0.05;lg.gain.value=2+Math.random()*3;l.connect(lg);lg.connect(o.frequency);o.connect(g);g.gain.value=0.3+Math.random()*0.2;g.connect(ambGain);l.start();o.start()}playing=true}
function toggleAudio(){if(!playing){initAudio()}else{if(actx){actx.close().then(function(){actx=null;playing=false})}}}
document.getElementById("st").addEventListener("click",toggleAudio);
var fOverlay=null,fTimer=null,fStart=0;
document.getElementById("fBtn").addEventListener("click",function(){
if(!fOverlay){fOverlay=document.createElement("div");fOverlay.style.cssText="position:fixed;z-index:10;top:0;left:0;width:100vw;height:100vh;background:#000;display:flex;align-items:center;justify-content:center;flex-direction:column;cursor:none";
fOverlay.innerHTML="<div id=\"fmt\" style=\"font-family:monospace;font-size:clamp(60px,12vw,120px);font-weight:200;color:rgba(255,255,255,0.08);letter-spacing:.1em\">00:00</div><div style=\"font-family:monospace;font-size:12px;font-weight:200;color:rgba(255,255,255,0.1);margin-top:2rem;letter-spacing:.2em\">tap to return</div>";
fOverlay.addEventListener("click",function(){fOverlay.style.display="none";if(fTimer){clearInterval(fTimer);fTimer=null}});document.body.appendChild(fOverlay)}
fOverlay.style.display="flex";fStart=Date.now();if(fTimer)clearInterval(fTimer);fTimer=setInterval(function(){var e=Math.floor((Date.now()-fStart)/1000);document.getElementById("fmt").textContent=String(Math.floor(e/60)).padStart(2,"0")+":"+String(e%60).padStart(2,"0")},200)});
document.getElementById("cBtn").addEventListener("click",function(){cmode=!cmode})
var sc=document.createElement("canvas");sc.style.display="none";document.body.appendChild(sc);var sctx=sc.getContext("2d");
document.getElementById("shc").addEventListener("click",async function(){
var W2=1080,H2=1350;sc.width=W2;sc.height=H2;
var g2=sctx.createRadialGradient(W2/2,H2/2,0,W2/2,H2/2,W2*0.7);g2.addColorStop(0,"#0f0f1a");g2.addColorStop(0.5,"#0a0a12");g2.addColorStop(1,"#050508");sctx.fillStyle=g2;sctx.fillRect(0,0,W2,H2);
for(var i=0;i<200;i++){sctx.beginPath();sctx.arc(Math.random()*W2,Math.random()*H2,Math.random()*2.5+0.3,0,Math.PI*2);sctx.fillStyle="rgba(255,255,255,"+(Math.random()*0.6+0.1)+")";sctx.fill()}
sctx.font="600 280px serif";sctx.textAlign="center";sctx.textBaseline="middle";sctx.fillStyle="rgba(255,255,255,0.03)";sctx.fillText("空",W2/2,H2*0.35);
var qt=document.getElementById("q").textContent||"空",sr=document.getElementById("src").textContent||"",qs=qt.length>30?36:qt.length>20?42:48;
sctx.font="200 "+qs+"px serif";sctx.fillStyle="rgba(255,255,255,0.75)";
var mw=W2*0.7,lines=[],line="";for(var c of qt){var t=line+c;if(sctx.measureText(t).width>mw&&line){lines.push(line);line=c}else{line=t}}if(line)lines.push(line);
var y=H2/2-lines.length*qs*1.6/2-40;for(var l of lines){sctx.fillText(l,W2/2,y);y+=qs*1.6}
sctx.font="200 22px monospace";sctx.fillStyle="rgba(255,255,255,0.2)";sctx.fillText("— "+sr,W2/2,y+50);
sctx.font="200 14px monospace";sctx.fillStyle="rgba(255,255,255,0.06)";sctx.fillText("KONG · 空",W2/2,H2-60);
sctx.strokeStyle="rgba(255,255,255,0.03)";sctx.lineWidth=1;sctx.strokeRect(40,40,W2-80,H2-80);
var l2=document.createElement("a");l2.download="kong-"+Date.now()+".png";l2.href=sc.toDataURL("image/png");l2.click()})
document.addEventListener("keydown",function(e){if(e.key==="f")document.getElementById("fBtn").click();if(e.key==="c")document.getElementById("cBtn").click();if(e.key==="s")toggleAudio();if(e.key==="Escape"&&fOverlay)fOverlay.style.display="none"})
if("serviceWorker" in navigator){window.addEventListener("load",function(){navigator.serviceWorker.register("sw.js").catch(function(){})})}
</script></body></html>
