<!DOCTYPE html><html lang="zh-CN"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>空 Rhythm</title><meta name="theme-color" content="#0a0a0f">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;400;600;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;color:#e8e6e3;font-family:"Inter",sans-serif;overflow:hidden;height:100vh;width:100vw;user-select:none;-webkit-user-select:none;touch-action:manipulation}
#c{position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:0}
#hz{position:fixed;z-index:5;left:0;width:100vw;height:2px;background:rgba(255,255,255,0.03);pointer-events:none}
#hp{position:fixed;z-index:5;border-radius:50%;border:1px solid rgba(255,255,255,0.03);pointer-events:none;transform:translate(-50%,-50%);width:70px;height:70px}
#hg{position:fixed;z-index:4;border-radius:50%;border:1px solid rgba(255,255,255,0.015);pointer-events:none;transform:translate(-50%,-50%);width:130px;height:130px}
.note{position:fixed;z-index:5;pointer-events:auto;cursor:pointer;border-radius:50%;transform:translate(-50%,-50%)}
.note:active{transform:translate(-50%,-50%) scale(0.8)!important}
.hud{position:absolute;top:1.5rem;left:1.5rem;z-index:10}
.score{font-weight:200;font-size:clamp(28px,5vw,54px);color:rgba(255,255,255,0.10);letter-spacing:-.03em}
.score span{font-weight:600;color:rgba(255,255,255,0.4)}
.combo{font-weight:200;font-size:clamp(11px,1.3vw,16px);color:rgba(255,255,255,0.06);margin-top:.1rem;letter-spacing:.15em}
.hud-r{position:absolute;top:1.5rem;right:1.5rem;z-index:10;text-align:right}
.hud-r .hs{font-weight:200;font-size:clamp(9px,1vw,12px);color:rgba(255,255,255,0.05)}
.bpm{position:absolute;bottom:1.5rem;left:1.5rem;z-index:10;font-weight:200;font-size:clamp(9px,.9vw,11px);color:rgba(255,255,255,0.035);letter-spacing:.12em}
.judge{position:fixed;z-index:15;font-weight:600;pointer-events:none;transform:translate(-50%,-50%);animation:jf .6s ease forwards}
@keyframes jf{0%{opacity:1;transform:translate(-50%,-100%) scale(1)}100%{opacity:0;transform:translate(-50%,-200%) scale(1.3)}}
.judge.P{color:rgba(74,222,128,0.35);font-size:clamp(13px,1.8vw,22px)}
.judge.G{color:rgba(250,204,21,0.25);font-size:clamp(11px,1.5vw,18px)}
.judge.M{color:rgba(255,100,100,0.12);font-size:clamp(10px,1.3vw,16px)}
#start,.go{position:fixed;z-index:20;top:0;left:0;width:100vw;height:100vh;background:rgba(10,10,15,0.92);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;backdrop-filter:blur(10px)}
#start .t{font-size:clamp(60px,15vw,140px);font-weight:800;color:rgba(255,255,255,0.06);letter-spacing:.05em}
#start .s{font-size:clamp(12px,2vw,24px);font-weight:200;color:rgba(255,255,255,0.12);letter-spacing:.3em;margin-top:-.5em}
#start .tp{font-size:clamp(10px,1vw,14px);font-weight:200;color:rgba(255,255,255,0.08);margin-top:1.5rem;letter-spacing:.2em;animation:p 2s ease-in-out infinite}
@keyframes p{0%,100%{opacity:.3}50%{opacity:.8}}
.go{display:none}.go .gs{font-size:clamp(60px,12vw,120px);font-weight:800;color:rgba(255,255,255,0.10);letter-spacing:-.03em}
.go .gl{font-size:clamp(10px,1.2vw,16px);font-weight:200;color:rgba(255,255,255,0.10);letter-spacing:.2em}
.go .gd{font-size:clamp(8px,.8vw,11px);font-weight:200;color:rgba(255,255,255,0.04);margin-top:.5rem;letter-spacing:.12em}
.go .gt{font-size:clamp(10px,1vw,14px);font-weight:200;color:rgba(255,255,255,0.07);margin-top:1.5rem;letter-spacing:.2em;animation:p 2s ease-in-out infinite}
</style></head><body>
<canvas id="c"></canvas>
<div id="hz" style="top:55%"></div><div id="hp" style="left:50vw;top:55%"></div><div id="hg" style="left:50vw;top:55%"></div>
<div id="start"><div class="t">空</div><div class="s">RHYTHM</div><div class="tp">tap to start</div></div>
<div class="go" id="go"><div class="gl">score</div><div class="gs" id="gs">0</div><div class="gd" id="gd"></div><div class="gt">tap to play again</div></div>
<div class="hud"><div class="score"><span id="sc">0</span></div><div class="combo" id="cb">combo 0</div></div>
<div class="hud-r"><div class="hs" id="hsr">best <span id="hsv">0</span></div></div>
<div class="bpm" id="bpmd">♩ -- BPM</div>
<script>
var actx=null
function ia(){if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)()}
function kk(t){try{ia();var o=actx.createOscillator(),g=actx.createGain();o.type="sine";o.frequency.setValueAtTime(150,actx.currentTime+t);o.frequency.exponentialRampToValueAtTime(30,actx.currentTime+t+0.08);g.gain.setValueAtTime(0.25,actx.currentTime+t);g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+t+0.1);o.connect(g);g.connect(actx.destination);o.start(actx.currentTime+t);o.stop(actx.currentTime+t+0.1)}catch(e){}}
function sn(t){try{ia();var b=actx.createBuffer(1,actx.sampleRate*0.1,actx.sampleRate),d=b.getChannelData(0);for(var i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,3);var s=actx.createBufferSource();s.buffer=b;var g=actx.createGain();g.gain.setValueAtTime(0.12,actx.currentTime+t);g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+t+0.08);var f=actx.createBiquadFilter();f.type="highpass";f.frequency.value=1000;s.connect(f);f.connect(g);g.connect(actx.destination);s.start(actx.currentTime+t);s.stop(actx.currentTime+t+0.1)}catch(e){}}
function ht(t){try{ia();var b=actx.createBuffer(1,actx.sampleRate*0.05,actx.sampleRate),d=b.getChannelData(0);for(var i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,5);var s=actx.createBufferSource();s.buffer=b;var g=actx.createGain();g.gain.setValueAtTime(0.05,actx.currentTime+t);g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+t+0.04);var f=actx.createBiquadFilter();f.type="highpass";f.frequency.value=5000;s.connect(f);f.connect(g);g.connect(actx.destination);s.start(actx.currentTime+t)}catch(e){}}
function hitSnd(){try{ia();var o=actx.createOscillator(),g=actx.createGain();o.type="sine";o.frequency.value=880;g.gain.setValueAtTime(0.04,actx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+0.05);o.connect(g);g.connect(actx.destination);o.start();o.stop(actx.currentTime+0.05)}catch(e){}}
var c=document.getElementById("c"),cx=c.getContext("2d"),W,H,bs=[],bt=0,mx={x:-999,y:-999}
function rs(){W=c.width=innerWidth;H=c.height=innerHeight}onresize=rs;rs()
for(var i=0;i<100;i++)bs.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.3+0.3,a:Math.random()*0.3+0.1,sp:Math.random()*0.08+0.01,da:(Math.random()-0.5)*0.005,ph:Math.random()*6.28})
onmousemove=function(e){mx.x=e.clientX;mx.y=e.clientY};onmouseleave=function(){mx.x=-999;mx.y=-999}
function db(){bt++;cx.clearRect(0,0,W,H)
var g=cx.createRadialGradient(W/2,H/2,0,W/2,H/2,Math.max(W,H)*0.6);g.addColorStop(0,"#0f0f1a");g.addColorStop(1,"#050508");cx.fillStyle=g;cx.fillRect(0,0,W,H)
for(var s of bs){s.a+=s.da;if(s.a>1)s.a=1;if(s.a<0.05)s.a=0.05;s.y-=s.sp;if(s.y<-5){s.y=H+5;s.x=Math.random()*W}var tw=Math.sin(bt*0.02+s.ph)*0.3+0.7
if(mx.x>0){var d=Math.hypot(s.x-mx.x,s.y-mx.y);if(d<200){var f=(1-d/200)*0.12;s.x+=(mx.x-s.x)/d*f;s.y+=(mx.y-s.y)/d*f}}
cx.beginPath();cx.arc(s.x,s.y,s.r,0,Math.PI*2);cx.fillStyle="rgba(255,255,255,"+(s.a*tw*0.5)+")";cx.fill()}
requestAnimationFrame(db)}db()
var st="start",sc=0,cb=0,hs=parseInt(localStorage.getItem("krhs")||"0"),notes=[],nid=0,bc=0,ga=false
var hy=0.55,ns=0.012,bpm=100,bi=0,bt2=0
function ub(v){bpm=Math.max(60,Math.min(180,v));bi=60000/bpm;document.getElementById("bpmd").textContent="♩ "+Math.round(bpm)+" BPM"}ub(100)
document.getElementById("hsv").textContent=hs
function mk(bn){
var h=Math.floor(bn*60)%360,sz=24+Math.random()*10,id=nid++
var el=document.createElement("div");el.className="note";el.id="n"+id
el.style.cssText="width:"+sz+"px;height:"+sz+"px;left:50vw;top:0;background:radial-gradient(circle at 30% 30%,rgba(255,255,255,0.4),hsl("+h+",80%,55%) 35%,hsl("+((h+60)%360)+",70%,20%) 100%);box-shadow:0 0 15px hsla("+h+",80%,50%,0.08)"
el.addEventListener("click",function(e){e.stopPropagation();hi(id)})
el.addEventListener("touchend",function(e){e.preventDefault();hi(id)})
document.body.appendChild(el)
notes.push({id:id,el:el,pr:0,sz:sz,hue:h})
function hi(id){if(!ga)return
for(var i=0;i<notes.length;i++){if(notes[i].id===id&&notes[i].pr<1.2){
var n=notes[i],d=Math.abs(n.pr-hy)*H
if(d<H*0.04){sc+=3;hitSnd();j("P","perfect",n.el)}
else if(d<H*0.09){sc+=1;hitSnd();j("G","good",n.el)}
else{j("M","miss",n.el)}
n.pr=999;n.el.remove()
up()
function j(c,t,el){
var d=document.createElement("div");d.className="judge "+c;d.textContent=t
var r=el.getBoundingClientRect();d.style.left=(r.left+r.width/2)+"px";d.style.top=(r.top)+"px"
document.body.appendChild(d);setTimeout(function(){d.remove()},600)
function up(){document.getElementById("sc").textContent=sc
var ce=document.getElementById("cb");ce.textContent="combo 0";ce.style.color="rgba(255,255,255,0.04)"
function sq(){if(!ga)return
var nw=Date.now()
if(bt2===0)bt2=nw
var el=nw-bt2
if(el>=bi){
var be=Math.floor(el/bi)
for(var b=0;b<be;b++){
var be2=bc++
if(be2%4===0){kk(0);ht(0)}
if(be2%4===2){sn(0)}
if(be2%2===1){ht(0)}
if(be2%8===0)mk(be2)
if(be2%16===7)mk(be2)
if(be2%16===14)mk(be2)
if(be2%32===0&&bpm<160)ub(bpm+2)
}
bt2+=be*bi
}
function an(){if(!ga)return
for(var i=notes.length-1;i>=0;i--){var n=notes[i]
if(n.pr>1.3||n.pr===999){if(n.pr!==999)n.el.remove();notes.splice(i,1);continue}
n.pr+=ns*(bpm/100)
var y=n.pr*H
n.el.style.top=y+"px"
var d=Math.abs(n.pr-hy)
if(d<0.08){var g=1-d/0.08;n.el.style.boxShadow="0 0 "+(15+g*40)+"px hsla("+n.hue+",80%,50%,"+(0.08+g*0.2)+")";n.el.style.transform="translate(-50%,-50%) scale("+(1+g*0.2)+")"}
if(n.pr>hy+0.05&&n.pr<999){n.pr=999;n.el.remove();j("M","miss",n.el);up()}}
document.getElementById("start").onclick=function(){
this.style.display="none";st="play";sc=0;bc=0;notes=[];ga=true;bt2=0
ub(100);up();document.getElementById("bpmd").textContent="♩ 100 BPM"
sq();an()
}
document.onclick=function(e){if(ga&&e.target===document.body){up()}}
function go(){ga=false;st="go"
for(var n of notes)n.el.remove()
notes=[]
document.getElementById("gs").textContent=sc
document.getElementById("gd").textContent="max combo "+cb+" | "+Math.round(sc/3)+" hits"
if(sc>hs){hs=sc;localStorage.setItem("krhs",String(hs))}
document.getElementById("hsv").textContent=hs
document.getElementById("go").style.display="flex"
setTimeout(function(){document.getElementById("go").onclick=function(){
this.style.display="none";st="play";sc=0;bc=0;notes=[];ga=true;bt2=0
ub(100);up();document.getElementById("bpmd").textContent="♩ 100 BPM"
sq();an()
}},100)
}
document.onkeydown=function(e){if(e.key==="Escape"&&ga)go()}
document.addEventListener("touchmove",function(e){e.preventDefault()},{passive:false})
</script></body></html>
