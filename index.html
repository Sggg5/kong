var c=document.getElementById("c"),cx=c.getContext("2d"),W,H,st=[],ss=[],ripples=[]

function rs(){W=c.width=innerWidth;H=c.height=innerHeight;var ac=document.getElementById("ac");ac.width=W;ac.height=H}onresize=rs;rs()

for(var i=0;i<600;i++){

for(var i=0;i<st.length;i++){var s=st[i]

s.x+=(s.bx-s.x)*0.01;s.y+=(s.by-s.y)*0.01
if(s.x<-5)s.x=W+5;if(s.x>W+5)s.x=-5
if(s.y>H+5)s.y=-5
if(cmode){for(var j=i+2;j<st.length;j+=2){var dx=st[i].x-st[j].x,dy=st[i].y-st[j].y,dist=Math.hypot(dx,dy);if(dist<120&&dist>8){cx.beginPath();cx.moveTo(st[i].x,st[i].y);cx.lineTo(st[j].x,st[j].y);cx.strokeStyle="rgba(180,200,255,"+(0.1*(1-dist/120))+")";cx.lineWidth=0.35;cx.stroke()}}}
var alpha=s.a*tw*0.9
cx.beginPath();cx.arc(s.x,s.y,s.r,0,Math.PI*2)
cx.fillStyle=colors[s.ci]+","+alpha+")";cx.fill()
if(s.ri>0.8){var gl=cx.createRadialGradient(s.x,s.y,0,s.x,s.y,s.r*4)
gl.addColorStop(0,colors[s.ci]+","+(alpha*0.06)+")")
gl.addColorStop(1,"rgba(0,0,0,0)");cx.fillStyle=gl
cx.beginPath();cx.arc(s.x,s.y,s.r*4,0,Math.PI*2);cx.fill()}
if(md){for(var i=0;i<st.length;i+=5){var s=st[i];var d=Math.hypot(s.x-mx.x,s.y-mx.y);if(d<md&&d>10){for(var j=i+5;j<st.length;j+=5){var s2=st[j];var d2=Math.hypot(s2.x-mx.x,s2.y-mx.y);if(d2<md&&d2>10){var dd=Math.hypot(s.x-s2.x,s.y-s2.y);if(dd<80&&dd>5){var ba=(1-dd/80)*(1-d/md)*0.06;cx.beginPath();cx.moveTo(s.x,s.x);cx.lineTo(s2.x,s2.y);cx.strokeStyle="rgba(180,200,255,"+ba+")";cx.lineWidth=0.3;cx.stroke()}}}}}}}
for(var i=ripples.length-1;i>=0;i--){var rp=ripples[i];rp.r+=1.8;rp.l-=0.018;if(rp.l<=0){ripples.splice(i,1);continue}
cx.beginPath();cx.arc(rp.x,rp.y,rp.r,0,Math.PI*2)
cx.strokeStyle="rgba(200,210,255,"+(rp.l*0.12)+")";cx.lineWidth=1;cx.stroke()
cx.beginPath();cx.arc(rp.x,rp.y,rp.r*0.4,0,Math.PI*2)
cx.fillStyle="rgba(200,210,255,"+(rp.l*0.02)+")";cx.fill()}
if(!gmode){for(var i=ss.length-1;i>=0;i--){var s=ss[i];s.x+=s.vx;s.y+=s.vy;s.life-=0.012;if(s.life<=0){ss.splice(i,1);continue}
var sla=Math.atan2(s.vy,s.vx);cx.beginPath();cx.moveTo(s.x,s.y)
cx.lineTo(s.x-Math.cos(sla)*s.len*s.life,s.y-Math.sin(sla)*s.len*s.life)
cx.strokeStyle=colors[s.ci]+","+(s.life*0.4)+")";cx.lineWidth=s.r;cx.stroke()
var sh=cx.createRadialGradient(s.x,s.y,0,s.x,s.y,s.r*6)
sh.addColorStop(0,colors[s.ci]+","+(s.life*0.12)+")")
sh.addColorStop(1,"rgba(0,0,0,0)");cx.fillStyle=sh
cx.beginPath();cx.arc(s.x,s.y,s.r*6,0,Math.PI*2);cx.fill()}
requestAnimationFrame(draw)}
function drawAurora(t){if(!amode){actx.clearRect(0,0,W,H);requestAnimationFrame(drawAurora);return}
actx.clearRect(0,0,W,H)
var palettes=[["rgba(0,255,128","rgba(100,200,255","rgba(200,100,255"],["rgba(255,100,200","rgba(255,200,100","rgba(100,255,200"]]
var pal=palettes[Math.floor(t/8000)%2]
for(var layer=0;layer<5;layer++){
var ly=0.1+layer*0.12+Math.sin(t*5e-5+layer)*0.05
var lh=0.15+Math.sin(t*6e-5+layer*2)*0.08
var alpha=0.08+Math.sin(t*4e-5+layer*3)*0.04
if(alpha<0)continue
for(var x=0;x<W;x+=2){
var y1=H*ly+Math.sin(x*0.008+t*0.001+layer)*H*0.08+Math.sin(x*0.003+t*0.0005+layer*2)*H*0.04
var y2=y1+H*lh+Math.sin(x*0.005+t*0.0008+layer*2)*H*0.03
var ci=layer%pal.length
var grad=actx.createLinearGradient(x,y1,x,y2)
grad.addColorStop(0,"rgba(0,0,0,0)")
grad.addColorStop(0.3,pal[ci]+","+alpha+")")
grad.addColorStop(0.7,pal[(ci+1)%pal.length]+","+(alpha*0.6)+")")

requestAnimationFrame(drawAurora)}
requestAnimationFrame(draw)
requestAnimationFrame(drawAurora)
var cux=-100,cuy=-100
function updateCur(){cux+=(mx.x-cux)*0.12;cuy+=(mx.y-cuy)*0.12
document.getElementById("cur").style.left=cux+"px";document.getElementById("cur").style.top=cuy+"px"

function uc(){var n=new Date();document.getElementById("clock").textContent=n.toLocaleString("zh-CN",{hour12:false,hour:"2-digit",minute:"2-digit",second:"2-digit"})}setInterval(uc,1000);uc()

q.classList.add("fade");s.classList.add("fade")
setTimeout(function(){q.textContent=d.quote||"…";s.textContent=d.source||""
var u=d.updated?new Date(d.updated).toLocaleString("zh-CN",{hour12:false,year:"numeric",month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit"}):""

async function ld(){try{var r=await fetch("data.json?_="+Date.now()),d=await r.json();updateQuote(d)}catch(e){document.getElementById("q").textContent="虚空生万有"}}ld();setInterval(ld,60000)
var actx,ambGain,playing=false
function initAudio(){if(actx)return;actx=new(window.AudioContext||window.webkitAudioContext)();ambGain=actx.createGain();ambGain.gain.value=0.035;ambGain.connect(actx.destination)
for(var i=0;i<3;i++){var o=actx.createOscillator(),g=actx.createGain(),l=actx.createOscillator(),lg=actx.createGain()
o.type="sine";o.frequency.value=55*(1+i*0.5+Math.random()*0.08)

var fOverlay=null,fTimer=null,fStart=0

gmode=!gmode;this.classList.toggle("active")
if(!gmode){for(var i=0;i<st.length;i++){st[i].bx=Math.random()*W;st[i].by=Math.random()*H}}})

var sc=document.createElement("canvas");sc.style.display="none";document.body.appendChild(sc);var sctx=sc.getContext("2d")

sctx.font="600 280px \"Noto Serif SC\",serif";sctx.textAlign="center";sctx.textBaseline="middle";sctx.fillStyle="rgba(255,255,255,0.03)";sctx.fillText("空",W2/2,H2*0.35)

var mw=W2*0.7,lines=[],line="";for(var c of qt){var t=line+c;if(sctx.measureText(t).width>mw&&line){lines.push(line);line=c}else{line=t}}if(line)lines.push(line)

sctx.font="200 14px Inter,sans-serif";sctx.fillStyle="rgba(255,255,255,0.06)";sctx.fillText("KONG · 空",W2/2,H2-60)

</script></body></html>
