<!DOCTYPE html><html lang="zh-CN"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>空 · Star Catch</title>
<meta name="theme-color" content="#0a0a0f">
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;400;600;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;color:#e8e6e3;font-family:"Inter",sans-serif;overflow:hidden;height:100vh;width:100vw;user-select:none;-webkit-user-select:none;touch-action:manipulation}
#c{position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:0}
#ui{position:fixed;z-index:10;top:0;left:0;width:100vw;height:100vh;pointer-events:none}
.hud{position:absolute;top:1.5rem;left:1.5rem;z-index:11}
.score{font-weight:200;font-size:clamp(32px,6vw,64px);color:rgba(255,255,255,0.12);letter-spacing:-.03em;line-height:1}
.score span{font-weight:600;color:rgba(255,255,255,0.5)}
.combo{font-weight:200;font-size:clamp(12px,1.5vw,18px);color:rgba(200,210,255,0.15);margin-top:0.2rem;letter-spacing:.15em;transition:opacity .3s}
.combo.on{color:rgba(200,210,255,0.4)}
.hud-r{position:absolute;top:1.5rem;right:1.5rem;z-index:11;text-align:right}
.hud-r .hs{font-weight:200;font-size:clamp(10px,1.2vw,14px);color:rgba(255,255,255,0.08);letter-spacing:.1em}
.hud-r .hs span{color:rgba(255,255,255,0.2)}
.card{position:absolute;z-index:11;bottom:2rem;left:50%;transform:translateX(-50%);text-align:center;pointer-events:none;transition:opacity .5s}
.card.hide{opacity:0}
.card .q{font-size:clamp(11px,1.2vw,16px);font-weight:200;color:rgba(255,255,255,0.12);letter-spacing:.08em;line-height:1.6;max-width:80vw}
.card .src{font-size:clamp(9px,.9vw,11px);font-weight:200;color:rgba(255,255,255,0.06);margin-top:.3rem;letter-spacing:.2em}
#start{position:fixed;z-index:20;top:0;left:0;width:100vw;height:100vh;background:rgba(10,10,15,0.9);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;backdrop-filter:blur(10px)}
#start .title{font-size:clamp(60px,15vw,140px);font-weight:800;color:rgba(255,255,255,0.06);letter-spacing:.05em;line-height:1}
#start .sub{font-size:clamp(12px,2vw,24px);font-weight:200;color:rgba(255,255,255,0.15);letter-spacing:.3em;margin-top:-.5em}
#start .tip{font-size:clamp(10px,1vw,14px);font-weight:200;color:rgba(255,255,255,0.08);margin-top:2rem;letter-spacing:.2em;animation:pd 2s ease-in-out infinite}
#start .hint{font-size:clamp(14px,2vw,24px);font-weight:200;color:rgba(255,255,255,0.2);margin-top:1rem;letter-spacing:.15em}
@keyframes pd{0%,100%{opacity:.3}50%{opacity:.8}}
#go{position:fixed;z-index:20;top:0;left:0;width:100vw;height:100vh;background:rgba(10,10,15,0.85);display:none;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;backdrop-filter:blur(6px)}
#go .go-score{font-size:clamp(60px,12vw,120px);font-weight:800;color:rgba(255,255,255,0.1);letter-spacing:-.03em}
#go .go-label{font-size:clamp(12px,1.5vw,20px);font-weight:200;color:rgba(255,255,255,0.15);letter-spacing:.2em}
#go .go-hs{font-size:clamp(10px,1vw,14px);font-weight:200;color:rgba(255,255,255,0.06);margin-top:1rem;letter-spacing:.15em}
#go .go-new{font-size:clamp(10px,1vw,14px);font-weight:400;color:rgba(74,222,128,0.3);margin-top:.3rem;letter-spacing:.2em;display:none}
#go .go-tip{font-size:clamp(11px,1.2vw,16px);font-weight:200;color:rgba(255,255,255,0.12);margin-top:2rem;letter-spacing:.2em;animation:pd 2s ease-in-out infinite}
.target{position:fixed;z-index:5;pointer-events:auto;cursor:pointer;border-radius:50%;transform:translate(-50%,-50%);transition:transform .1s}
.target:active{transform:translate(-50%,-50%) scale(0.85)}
.miss{position:fixed;z-index:6;font-weight:200;font-size:clamp(24px,4vw,48px);color:rgba(255,100,100,0.12);pointer-events:none;animation:mf .8s ease forwards}
@keyframes mf{0%{opacity:1;transform:translate(-50%,-50%) scale(1)}100%{opacity:0;transform:translate(-50%,-50%) scale(2) translateY(-40px)}}
.burst{position:fixed;z-index:4;pointer-events:none;border-radius:50%;animation:bf .5s ease forwards}
@keyframes bf{0%{opacity:1;transform:translate(-50%,-50%) scale(0)}100%{opacity:0;transform:translate(-50%,-50%) scale(3)}}
@media(max-width:500px){.hud{top:1rem;left:1rem}.hud-r{top:1rem;right:1rem}.card{bottom:1rem}}
</style></head><body>
<canvas id="c"></canvas>
<div id="start">
<div class="title">空</div>
<div class="sub">STAR CATCH</div>
<div class="hint">★</div>
<div class="tip">tap to start</div>
</div>
<div id="go">
<div class="go-label">score</div>
<div class="go-score" id="goScore">0</div>
<div class="go-hs">best <span id="goHS">0</span></div>
<div class="go-new" id="goNew">★ NEW HIGH SCORE ★</div>
<div class="go-tip">tap to play again</div>
</div>
<div class="hud"><div class="score"><span id="score">0</span></div><div class="combo" id="combo">COMBO x1</div></div>
<div class="hud-r"><div class="hs">BEST <span id="hs">0</span></div></div>
<div class="card" id="card"><div class="q" id="q">…</div><div class="src" id="src">&nbsp;</div></div>
<script>
var actx=null
function initAudio(){if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)()}
function playBeep(freq,dur,vol){try{initAudio();var o=actx.createOscillator(),g=actx.createGain();o.type="sine";o.frequency.value=freq;g.gain.value=vol;g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+dur);o.connect(g);g.connect(actx.destination);o.start();o.stop(actx.currentTime+dur)}catch(e){}}
function playCatch(){playBeep(880,0.08,0.06)}
function playMiss(){playBeep(220,0.15,0.04)}
function playCombo(n){playBeep(660+n*40,0.06,0.05)}
function playStart(){playBeep(440,0.1,0.05);setTimeout(function(){playBeep(660,0.1,0.05)},100);setTimeout(function(){playBeep(880,0.15,0.05)},200)}
var c=document.getElementById("c"),cx=c.getContext("2d"),W,H,stars=[],bgTime=0
function rs(){W=c.width=innerWidth;H=c.height=innerHeight}onresize=rs;rs()
for(var i=0;i<120;i++)stars.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.5+0.3,a:Math.random()*0.4+0.1,sp:Math.random()*0.08+0.01,da:(Math.random()-0.5)*0.005,ph:Math.random()*6.28})
function drawBg(){bgTime++;cx.clearRect(0,0,W,H)
var g=cx.createRadialGradient(W/2,H/2,0,W/2,H/2,Math.max(W,H)*0.6)
g.addColorStop(0,"#0f0f1a");g.addColorStop(1,"#050508");cx.fillStyle=g;cx.fillRect(0,0,W,H)
for(var s of stars){s.a+=s.da;if(s.a>1)s.a=1;if(s.a<0.1)s.a=0.1;s.y-=s.sp;if(s.y<-5){s.y=H+5;s.x=Math.random()*W}var tw=Math.sin(bgTime*0.02+s.ph)*0.3+0.7;cx.beginPath();cx.arc(s.x,s.y,s.r,0,Math.PI*2);cx.fillStyle="rgba(255,255,255,"+(s.a*tw*0.6)+")";cx.fill()}
if(Math.random()<0.05){var sx=Math.random()*W,sy=Math.random()*H*0.2,sl=50+Math.random()*80;for(var i=0;i<sl;i+=2){cx.beginPath();cx.arc(sx+i*1.5,sy+i*0.8,1-i/sl*0.8,0,Math.PI*2);cx.fillStyle="rgba(255,255,255,"+((1-i/sl)*0.3)+")";cx.fill()}}
requestAnimationFrame(drawBg)}drawBg()
var state="start",score=0,combo=0,highScore=parseInt(localStorage.getItem("kongHS")||"0"),targets=[],targetId=0,gameTimer=0,spawnRate=60,maxTargets=8,round=1
document.getElementById("hs").textContent=highScore
function spawnTarget(){
var size=40+Math.random()*40+round*2
var x=size/2+Math.random()*(W-size),y=size/2+Math.random()*(H*0.7)+H*0.1
var hue=Math.floor(Math.random()*360)
var life=100+Math.random()*60
var id=targetId++
var el=document.createElement("div");el.className="target";el.id="t"+id
var grad="radial-gradient(circle at 35% 35%,rgba(255,255,255,0.3),hsl("+hue+",80%,60%) 40%,hsl("+((hue+40)%360)+",70%,30%) 100%)"
el.style.cssText="width:"+size+"px;height:"+size+"px;left:"+x+"px;top:"+y+"px;background:"+grad+";box-shadow:0 0 "+size*0.5+"px hsla("+hue+",80%,60%,0.2)"
el.addEventListener("click",function(e){e.stopPropagation();catchStar(id)})
el.addEventListener("touchend",function(e){e.preventDefault();catchStar(id)})
document.body.appendChild(el)
targets.push({id:id,el:el,x:x,y:y,size:size,life:life,maxLife:life,hue:hue})
}
function catchStar(id){
for(var i=0;i<targets.length;i++){if(targets[i].id===id){
var t=targets[i]
combo++;score+=combo
playCatch();if(combo%5===0)playCombo(combo)
var b=document.createElement("div");b.className="burst";var s=t.size*2;b.style.cssText="width:"+s+"px;height:"+s+"px;left:"+t.x+"px;top:"+t.y+"px;background:radial-gradient(circle,hsl("+t.hue+",80%,60%) 0%,transparent 100%);box-shadow:0 0 "+s+"px hsla("+t.hue+",80%,60%,0.1)"
document.body.appendChild(b);setTimeout(function(){b.remove()},500)
t.el.remove();targets.splice(i,1)
updateScore()
return}}
function missStar(t){playMiss();combo=0;updateScore()
function updateScore(){document.getElementById("score").textContent=score
var ce=document.getElementById("combo");ce.textContent="COMBO x"+combo;ce.className=combo>1?"combo on":"combo"
function gameLoop(){if(state!=="play")return
gameTimer++
var rate=Math.max(20,spawnRate-Math.floor(score/50)*3)
if(gameTimer%rate===0&&targets.length<maxTargets+Math.floor(round/2))spawnTarget()
var newRound=Math.floor(score/30)+1
if(newRound!==round){round=newRound;maxTargets=Math.min(12,8+Math.floor(round/3))}
for(var i=targets.length-1;i>=0;i--){var t=targets[i];t.life--
var p=t.life/t.maxLife
t.el.style.transform="translate(-50%,-50%) scale("+(0.6+0.4*p)+")"
t.el.style.opacity=p
if(p<0.3){var glow=0.1+(1-p)*0.2;t.el.style.boxShadow="0 0 "+(t.size*glow)+"px hsla("+t.hue+",100%,60%,"+glow+")"}
if(t.life<=0){t.el.remove();targets.splice(i,1);combo=0;updateScore();playMiss()}
setTimeout(gameLoop,50)}
document.getElementById("start").addEventListener("click",function(){
this.style.display="none";state="play";score=0;combo=0;round=1;maxTargets=8;spawnRate=60;targets=[];updateScore()
playStart();gameLoop()
document.getElementById("card").classList.add("hide")
document.body.addEventListener("click",function(e){if(state==="play"&&e.target===document.body){combo=0;updateScore()}})
})
function gameOver(){state="go"
for(var t of targets){t.el.remove()}targets=[]
document.getElementById("goScore").textContent=score
document.getElementById("goHS").textContent=highScore
var isNew=false
if(score>highScore){highScore=score;localStorage.setItem("kongHS",String(highScore));isNew=true}
document.getElementById("goNew").style.display=isNew?"block":"none"
document.getElementById("go").style.display="flex"
document.getElementById("card").classList.remove("hide")

document.getElementById("go").addEventListener("click",function(){
this.style.display="none";state="play";score=0;combo=0;round=1;maxTargets=8;spawnRate=60;targets=[];updateScore()
document.getElementById("card").classList.add("hide")
gameLoop()
})
async function loadQuote(){try{var r=await fetch("data.json?_="+Date.now()),d=await r.json();document.getElementById("q").textContent=d.quote||"";document.getElementById("src").textContent=d.source||""}catch(e){document.getElementById("q").textContent=""}}loadQuote()
document.addEventListener("touchmove",function(e){e.preventDefault()},{passive:false})
</script></body></html>
