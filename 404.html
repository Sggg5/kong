<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — 空</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0f;
    color: #e8e6e3;
    font-family: 'Noto Serif SC', 'Inter', sans-serif;
    height: 100vh; width: 100vw;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column;
    overflow: hidden;
  }
  .code {
    font-size: clamp(100px, 20vw, 200px);
    font-weight: 200;
    color: rgba(255,255,255,0.06);
    letter-spacing: 0.1em;
  }
  .msg {
    font-size: clamp(16px, 2.5vw, 36px);
    font-weight: 200;
    color: rgba(255,255,255,0.3);
    letter-spacing: 0.3em;
    margin-top: -0.5em;
  }
  .sub {
    font-size: clamp(12px, 1.2vw, 18px);
    font-weight: 200;
    color: rgba(255,255,255,0.12);
    margin-top: 2em;
    letter-spacing: 0.2em;
  }
  a {
    color: rgba(255,255,255,0.3);
    text-decoration: none;
    border-bottom: 1px solid rgba(255,255,255,0.1);
    transition: all 0.3s;
  }
  a:hover { color: rgba(255,255,255,0.6); border-color: rgba(255,255,255,0.3); }
  .stars {
    position: fixed;
    width: 100%; height: 100%;
    background: radial-gradient(1px 1px at 20% 30%, rgba(255,255,255,0.15) 0%, transparent 100%),
                radial-gradient(1px 1px at 40% 70%, rgba(255,255,255,0.1) 0%, transparent 100%),
                radial-gradient(1px 1px at 60% 20%, rgba(255,255,255,0.12) 0%, transparent 100%),
                radial-gradient(1px 1px at 80% 50%, rgba(255,255,255,0.08) 0%, transparent 100%),
                radial-gradient(1px 1px at 10% 80%, rgba(255,255,255,0.1) 0%, transparent 100%),
                radial-gradient(1px 1px at 70% 90%, rgba(255,255,255,0.06) 0%, transparent 100%);
    z-index: -1;
  }
</style>
</head>
<body>
<div class="stars"></div>
<div class="code">404</div>
<div class="msg">此页本空</div>
<div class="sub"><a href="/">← 归去来兮</a></div>
</body>
</html>
